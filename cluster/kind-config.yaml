# kind cluster config for the `study` cluster, with API server audit logging on.
#
# Run from the repo root so the relative extraMounts hostPath resolves:
#   kind delete cluster --name study
#   kind create cluster --name study --config cluster/kind-config.yaml
#   kind export kubeconfig --name study
#
# kindest/node:v1.35.1 (via kind v0.32) emits kubeadm ClusterConfiguration as
# v1beta3, where apiServer.extraArgs is a MAP of string to string. The v1beta4
# list-of-{name,value} form is only accepted on v1.36+ images and is rejected here
# with "cannot unmarshal array into ... extraArgs of type map[string]string".
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  # Pin the exam version explicitly. kind v0.32 defaults to a newer image
  # (v1.36.1), which would drift off the CKA/CKS/CKAD v1.35 exam environment.
  - role: control-plane
    image: kindest/node:v1.35.1
    kubeadmConfigPatches:
      - |
        kind: ClusterConfiguration
        apiServer:
          extraArgs:
            audit-policy-file: /etc/kubernetes/audit/policy.yaml
            audit-log-path: /var/log/kubernetes/kube-apiserver-audit.log
            audit-log-maxsize: "100"
            audit-log-maxbackup: "5"
          extraVolumes:
            - name: audit-policy
              hostPath: /etc/kubernetes/audit/policy.yaml
              mountPath: /etc/kubernetes/audit/policy.yaml
              readOnly: true
              pathType: File
            - name: audit-log
              hostPath: /var/log/kubernetes
              mountPath: /var/log/kubernetes
              pathType: DirectoryOrCreate
    extraMounts:
      - hostPath: ./audit/policy.yaml
        containerPath: /etc/kubernetes/audit/policy.yaml
        readOnly: true
